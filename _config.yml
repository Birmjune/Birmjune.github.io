title: blank
first_name: Birmjune
middle_name:
last_name: Kim
description: Personal academic homepage of Birmjune Kim. Projects, research, and news.
keywords: Birmjune Kim, artificial intelligence, efficient AI systems, model compression, quantization
lang: en
icon: ⚛️

url: https://Birmjune.github.io
baseurl:

navbar_fixed: true
footer_fixed: true
back_to_top: true
max_width: 930px

collections:
  news:
    output: false
  projects:
    output: true

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include:
  - _pages
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - node_modules/
  - package.json
  - package-lock.json
  - purgecss.config.js
  - README.md
  - vendor/
keep_files:
  - CNAME
  - .nojekyll

plugins:
  - jekyll-cache-bust
  - jekyll-minifier
  - jekyll-sitemap
plugins_dir: _disabled_plugins

defaults:
  - scope:
      path: assets
    values:
      sitemap: false

sass:
  style: compressed

jekyll-minifier:
  compress_javascript: false
  exclude:
    - robots.txt
