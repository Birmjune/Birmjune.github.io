name: Deploy site

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Build site
        run: JEKYLL_ENV=production bundle exec jekyll build

      - name: Purge unused CSS
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js

      - name: Generate CV PDF
        run: |
          CHROME=$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium)
          "$CHROME" --headless --disable-gpu --no-sandbox --no-pdf-header-footer \
            --virtual-time-budget=15000 --run-all-compositor-stages-before-draw \
            --print-to-pdf="$GITHUB_WORKSPACE/_site/assets/pdf/cv.pdf" \
            "file://$GITHUB_WORKSPACE/_site/cv_print/index.html"

      - name: Deploy
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
